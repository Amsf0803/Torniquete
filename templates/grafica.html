<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gráfica Semestral</title>
    <script src="{{ url_for('static', filename='js/chart.js') }}"></script>
</head>
<style>
    /* --- ESTILOS (IGUALES A LOS TUYOS) --- */
    .grafica-container {
        width: 80%;           
        max-width: 800px;     
        display: block;       
        margin: 20px auto;    
        background-color: rgba(255, 255, 255, 0.7); 
        padding: 20px;
        border-radius: 15px;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        padding: 20px;
        margin: 0;
        text-align: center;
        color: #6c1d45;
        font-weight: bold;
        /* Asegúrate de que tus imágenes también estén en static/images localmente */
        background: 
            url("{{ url_for('static', filename='images/logo-ipn-blanco.png') }}") no-repeat center center,
            linear-gradient(170deg, #6c1d45, #ffffff 75%);
        background-size: 750px, cover;
        background-attachment: fixed;
        background-position: center 100px, center;
    }
    
    h2 {
        text-align: center;
        color: #000; 
        font-size: 2.5em;
        margin-bottom: 20px;
    }

    form {
        max-width: 400px;
        margin: auto;
        background-color: rgba(255, 255, 255, 0.8);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    label { display: block; margin-bottom: 10px; }

    button {
        display: block;
        width: 100%;
        padding: 10px;
        background-color: #6c1d45;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: transform 400ms;
    }

    button:hover { transform: scale(1.05); }

    .imagenes img { width: 200px; height: auto; }
    .logo { position: absolute; left: 5%; top: 20px; }
    .LIA { position: absolute; right: 2%; top: 20px; }
    
    .grupos { margin-top: 20px; text-align: left; }
    h3 { text-align: center; color: #6c1d45; margin-top: 20px; font-weight: bold; }
    .regreso {
        margin-top: 50px;
        background-color: #6c1d45;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        padding: 10px 20px;
        font-size: 16px;
        width: 50%;
        display: block;
        margin: 0 auto;
    }
    a { text-decoration: none; }
    hr { border: 0.7px solid #fff; margin: 20px 0; }
    form hr { margin: 0; border: 0.7px solid #6c1d45; }
    .subtitulo { color: #6c1d45; font-weight: bold; }
    .ciclo { text-align: center; color: #6c1d45; }
    .exitoso {
        text-align: center;
        font-size: 1.2em;
        font-weight: bold;
        background-color: rgba(255, 255, 255, 0.8);
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        margin: auto;
        width: 60%;
    }
    button:disabled {
        background-color: rgba(128, 128, 128, 0.315);
        cursor: not-allowed;
    }
</style>

<body>

    <div class="imagenes">
        <img class="logo" src="{{ url_for('static', filename='images/Cecyt16.png') }}" alt="Logo Cecyt">
        <img class="LIA" src="{{ url_for('static', filename='images/Logo_LIA.png') }}" alt="Logo LIA">
    </div>
    
    <h1 style="font-size: 50px; color: rgb(255, 255, 255);"><b> Monitoreo de Accesos </b></h1>

    <div class="grafica-container">
        <h2>Registros de Entrada</h2>
        <canvas id="canvasEntrada"></canvas>
    </div>

    <div class="grafica-container">
        <h2>Registros de Salida</h2>
        <canvas id="canvasSalida"></canvas>
    </div>

    <script>
        // 1. Recibir los datos de Python
        const etiquetas = JSON.parse('{{ labels | tojson | safe }}');
        const datosEntrada = JSON.parse('{{ data_in | tojson | safe }}');
        const datosSalida = JSON.parse('{{ data_out | tojson | safe }}');

        // ================= GRÁFICA 1: ENTRADAS =================
        const ctxIn = document.getElementById('canvasEntrada').getContext('2d');
        new Chart(ctxIn, {
            type: 'bar',
            data: {
                labels: etiquetas,
                datasets: [{
                    label: 'Entradas',
                    data: datosEntrada,
                    backgroundColor: 'rgba(54, 162, 235, 0.5)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });

        // ================= GRÁFICA 2: SALIDAS =================
        const ctxOut = document.getElementById('canvasSalida').getContext('2d');
        new Chart(ctxOut, {
            type: 'bar',
            data: {
                labels: etiquetas,
                datasets: [{
                    label: 'Salidas',
                    data: datosSalida,
                    backgroundColor: 'rgba(255, 99, 132, 0.5)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    borderWidth: 1
                }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });
    </script>
<br>
    <a href="/"><button>Regresar al menu principal</button></a>

</body>
</html>
