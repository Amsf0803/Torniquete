<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Seleccionar Ciclo Escolar</title>
    <link rel="icon" href="/static/images/LIA_Mini.png">
    <style>
        /* ================= ESTILOS GENERALES Y TEMA VERDE ================= */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            margin: 0; /* Quitamos padding-left para centrar bien en móvil */
            text-align: left;
            
            /* Fondo Verde Bosque */
            background: 
            url("/static/images/logo-ipn-blanco.png") no-repeat center center,
            linear-gradient(170deg, #2e7d32, #ffffff 80%);

            background-size: 750px, cover; 
            background-attachment: fixed;
            background-position: center 150px, center;
        }
        
        /* ================= HEADER LOGOS (FLEXBOX) ================= */
        .imagenes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 20px auto;
        }

        .imagenes img {
            width: 160px;
            height: auto;
            position: static; /* Quitamos las posiciones absolutas */
        }

        /* ================= TIPOGRAFÍA ================= */
        h2 {
            text-align: center;
            color: #fff;
            font-size: 2.4em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background-color: #388e3c; /* Verde más oscuro para el título */
            padding: 15px 30px;
            border-radius: 10px;
        }

        /* ================= CONTENEDOR DEL FORMULARIO ================= */
        form {
            max-width: 400px;
            margin: auto;
            background-color: rgba(255, 255, 255, 0.95); /* Fondo blanco más sólido */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            box-sizing: border-box; /* Previene desbordes en celulares */
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }

        /* Estilos del Selector */
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: #f9f9f9;
        }

        select:focus {
            outline: none;
            border-color: #2e7d32; /* Borde verde al hacer foco */
            box-shadow: 0 0 5px rgba(46, 125, 50, 0.4);
        }

        .grupos {
            margin-bottom: 20px;
            text-align: left;
        }

        /* ================= BOTONES ================= */
        button[type="submit"] {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #2e7d32; /* Verde principal */
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 400ms, background-color 300ms;
        }

        button[type="submit"]:hover {
            transform: scale(1.05);
            background-color: #1b5e20; /* Verde más oscuro al pasar el mouse */
        }

        /* Contenedor Botón Regreso */
        .btn-container {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .return {
            background-color: #333; /* Gris oscuro para diferenciar */
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 300ms;
        }

        .return:hover {
            transform: scale(1.05);
            background-color: #000;
        }

        a { text-decoration: none; }

        /* ================= MEDIA QUERIES (CELULARES) ================= */
        @media (max-width: 600px) {
            .imagenes {
                justify-content: center;
                gap: 20px;
            }
            .imagenes img {
                width: 110px; /* Logos más pequeños */
            }
            h2 {
                font-size: 1.8em; /* Título principal adaptado */
            }
            form {
                padding: 20px;
            }
            body {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    
    <div class="imagenes">
        <img class="logo" src="../static/images/Cecyt16.png" alt="CECyT 16">
        <img class="LIA" src="../static/images/Logo_LIA.png" alt="LIA">
    </div>
    
    <h2>Seleccione el grupo que va a registrar Manualmente:</h2>
    
    <form method="POST" action="/configurar">
        <div class="grupos">
            <label for="grupo">Grupo:</label>
            <select name="grupo" required>
                <option value="">-- Selecciona un grupo --</option>
                {% for grupo in grupos %}
                <option value="{{ grupo }}" {% if grupo == grupo_seleccionado %}selected{% endif %}>{{ grupo }}</option>
                {% endfor %}
            </select>
        </div>
        
        <button type="submit">Continuar</button>
    </form>
    
    <div class="btn-container">
        <a href="/"><button class="return">Regresar al menú</button></a>
    </div>

</body>
</html>
