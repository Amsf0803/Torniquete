<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/images/LIA_Mini.png">
    <title>Suspensiones</title>

<style>
    /* ================= ESTILOS GENERALES Y TEMA ÍNDIGO ================= */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        padding: 20px;
        margin: 0; /* Quitamos el padding-left que descentraba en celulares */

        /* Fondo actualizado a tono Índigo */
        background: 
            url("/static/images/logo-ipn-blanco.png") no-repeat center center,
            linear-gradient(170deg, #3f51b5, #ffffff 75%);

        background-size: 750px, cover; 
        background-attachment: fixed;
        background-position: center 100px, center;
    }

    /* ================= HEADER LOGOS (FLEXBOX) ================= */
    .imagenes {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1000px;
        margin: 0 auto 20px auto;
    }

    .imagenes img {
        width: 160px;
        height: auto;
        position: static; /* Quitamos la posición absoluta */
    }

    h2 {
        text-align: center;
        color: #fff;
        font-size: 2.5em;
        margin-bottom: 30px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        background-color: #303f9f; /* Fondo más oscuro para el título */
        padding: 15px 30px;
        border-radius: 10px;
    }

    /* ================= CONTENEDOR DEL FORMULARIO ================= */
    form {
        max-width: 450px;
        margin: auto;
        background-color: rgba(255, 255, 255, 0.95); /* Un poco más sólido */
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        box-sizing: border-box; /* Previene desbordamiento en móviles */
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
        color: #333;
    }

    /* Estilos para que los selectores y fechas se vean modernos y responsivos */
    select, input[type="date"] {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 16px;
        background-color: #f9f9f9;
        margin-bottom: 15px;
    }

    select:focus, input[type="date"]:focus {
        outline: none;
        border-color: #3f51b5; /* Borde índigo al seleccionar */
        box-shadow: 0 0 5px rgba(63, 81, 181, 0.4);
    }

    .grupos {
        text-align: left;
    }

    /* ================= BOTONES ================= */
    button[type="submit"] {
        display: block;
        width: 100%;
        padding: 12px;
        background-color: #3f51b5; /* Botón Índigo */
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.1em;
        font-weight: bold;
        transition: transform 400ms, background-color 300ms;
        margin-top: 10px;
    }

    button[type="submit"]:hover {
        transform: scale(1.05);
        background-color: #303f9f; /* Índigo más oscuro al pasar el mouse */
    }

    .btn-container {
        text-align: center;
        margin-top: 40px;
        margin-bottom: 20px;
    }

    .regreso {
        background-color: #333; /* Botón oscuro para diferenciar del principal */
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        padding: 12px 20px;
        font-size: 16px;
        width: 100%;
        max-width: 300px;
        transition: transform 300ms;
    }

    .regreso:hover {
        transform: scale(1.05);
        background-color: #000;
    }

    a { text-decoration: none; }

    /* ================= SEPARADORES Y TÍTULOS INTERNOS ================= */
    form hr {
        margin: 20px 0;
        border: 0.7px solid #3f51b5; /* Línea Índigo */
        opacity: 0.4;
    }

    .subtitulo {
        color: #3f51b5; /* Título Índigo */
        font-weight: bold;
        text-align: center;
        font-size: 1.1em;
        margin-bottom: 20px;
    }

    h3 {
        color: #3f51b5; /* Título Índigo */
        text-align: center;
        margin-top: 20px; 
    }

    /* ================= MEDIA QUERIES (CELULARES) ================= */
    @media (max-width: 600px) {
        .imagenes {
            justify-content: center;
            gap: 20px;
        }
        .imagenes img {
            width: 110px; /* Logos más pequeños en móvil */
        }
        h2 {
            font-size: 1.8em;
        }
        form {
            padding: 20px; /* Reducimos el margen interno en celulares */
        }
        body {
            padding: 10px;
        }
    }
</style>

</head>
<body>
    <div class="imagenes">
        <img class="logo" src="../static/images/Cecyt16.png" alt="CECyT 16">
        <img class="LIA" src="../static/images/Logo_LIA.png" alt="LIA">
    </div>

    <h2>Suspensiones</h2>
    
    <form method="POST" action="/suspensiones">
        <div class="grupos">
            <label for="grupo">Grupo:</label>
            <select name="grupo" required>
                <option value="">-- Selecciona un grupo --</option>
                {% for grupo in grupos %}
                <option value="{{ grupo }}" {% if grupo == grupo_seleccionado %}selected{% endif %}>{{ grupo }}</option>
                {% endfor %}
            </select>
        </div>

        {% if grupo_seleccionado %}
        <hr>
        <h3>Selecciona la boleta del suspendido:</h3>
        <div class="grupos">
            <label for="boleta">Boleta:</label>
            <select name="boleta" required>
                <option value="">-- Selecciona una boleta --</option>
                {% for boleta in boletas %}
                <option value="{{ boleta }}" {% if boleta == boleta_suspendida %}selected{% endif %}>{{ boleta }}</option>
                {% endfor %}
            </select>
        </div>
        
        <hr>
        
        <h3 class="subtitulo">Selecciona la fecha de inicio y fin de la suspensión</h3>

        <label for="fecha_inicio">Inicio de la suspensión:</label>
        <input type="date" name="fecha_inicio" value="{{ hoy }}" required>

        <label for="fecha_fin">Fin de la suspensión:</label>
        <input type="date" name="fecha_fin" value="{{ hoy }}" required>
        {% endif %}

        <button type="submit">Continuar</button>
    </form>

    <div class="btn-container">
        <a href="/">
            <button class="regreso" type="button">Regresar a la página principal</button>
        </a>
    </div>

</body> 
</html>
