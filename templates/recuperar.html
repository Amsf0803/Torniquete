<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - LIA</title>
    <link rel="icon" href="/static/images/LIA_Mini.png">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Arial', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: url("/static/images/logo-ipn-blanco.png") no-repeat center center, 
                        linear-gradient(135deg, #0a192f 0%, #1a365d 100%);
            background-size: 550px, cover; background-attachment: fixed; background-blend-mode: overlay;
            color: #ffffff;
        }
        .card-container {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 40px; width: 90%; max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center;
        }
        h2 { color: #64ffda; margin-bottom: 15px; font-size: 1.8rem; }
        p.subtitle { color: #a8b2d1; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.9rem; margin-bottom: 8px; color: #a8b2d1; }
        input[type="email"] {
            width: 100%; padding: 12px 15px; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px; background: rgba(0,0,0,0.2); color: white; font-size: 1rem;
            box-sizing: border-box; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #64ffda; background: rgba(0,0,0,0.4); }
        .btn-submit {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px;
            background: linear-gradient(90deg, #0a2540 0%, #2b84d1 100%);
            border: 1px solid #64ffda; color: white; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-submit:hover { background: linear-gradient(90deg, #2b84d1 0%, #64ffda 100%); color: #0a192f; }
        .enlace { display: inline-block; margin-top: 20px; color: #64ffda; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        .enlace:hover { color: #ffffff; }
        
        .alert-error { background: rgba(255, 75, 75, 0.2); color: #ff6b6b; padding: 10px; border-radius: 8px; border: 1px solid #ff6b6b; margin-bottom: 20px; font-size: 0.9rem; }
        .alert-success { background: rgba(100, 255, 218, 0.1); color: #64ffda; padding: 10px; border-radius: 8px; border: 1px solid #64ffda; margin-bottom: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card-container">
        <h2>Recuperar Contraseña</h2>
        <p class="subtitle">Ingresa tu correo registrado y te enviaremos instrucciones de acceso.</p>
        
        {% if error %} <div class="alert-error">{{ error }}</div> {% endif %}
        {% if success %} <div class="alert-success">{{ success }}</div> {% endif %}

        <form action="/recuperar_password" method="POST">
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required autocomplete="off">
            </div>
            
            <button type="submit" class="btn-submit">Enviar Correo</button>
        </form>
        
        <a href="/login" class="enlace">← Volver al Login</a>
    </div>
</body>
</html>
