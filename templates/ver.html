<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Acceso Dual - IPN</title>
    <link rel="icon" href="/static/images/LIA_Mini.png">
    <style>zz
        /* ================= ESTILOS GENERALES Y TEMA AZUL MARINO ================= */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: 
                url("/static/images/logo-ipn-blanco.png") no-repeat center center,
                linear-gradient(135deg, #0a192f 0%, #1a365d 100%);
            background-size: 550px, cover;
            background-attachment: fixed;
            background-blend-mode: overlay;
        }

        .split-screen {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        .lado-monitor {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 2px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .lado-monitor:last-child { border-right: none; }

        .etiqueta-lado {
            position: absolute;
            top: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: #64ffda;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .inscrito-card {
            width: 85%;
            max-width: 600px;
            border-radius: 20px;
            padding: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        /* ESTADO POR DEFECTO (ESPERANDO) */
        .estado-esperando {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            color: #ffffff;
            min-height: 450px;
            justify-content: center;
        }

        /* CLASES DE COLORES DINÁMICOS */
        .inscrito-activo { background: linear-gradient(90deg, #212420 0%, #1d6c2e 45%, #ffffff 150%); color: white; }
        .inscrito-suspendido { background: linear-gradient(145deg, #ffffff 0%, #fbbf24 100%); color: #92400e; }
        .inscrito-inactivo { background: linear-gradient(145deg, #bd6161 0%, #760000 100%); color: white; }
        .inscrito-LIA { background: linear-gradient(90deg, #421329 0%, #6c1d45 45%, #ffffff 150%); color: white; border: 2px solid #ff00ff; }
        .master { background: linear-gradient(90deg, #121153 0%, #221d6c 35%, #ffffff 125%); color: white; border: 2px solid gold; }

        .boleta-display {
            font-size: 2.2rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            width: 100%;
        }

        .status-display {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .foto-alumno {
            width: 200px;
            height: 240px;
            object-fit: cover;
            border-radius: 20px;
            border: 4px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 20px;
        }

        .mochila-operation {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
        }

        .hidden { display: none !important; }
        
        .content-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div class="split-screen">
        <div class="lado-monitor">
            <div class="etiqueta-lado">Torniquete Izquierdo</div>
            <div id="card-izq" class="inscrito-card estado-esperando">
                <div id="espera-izq" class="content-wrapper">
                    <img src="/static/images/LIA_Mini.png" width="90" style="opacity: 0.7; margin-bottom: 20px;">
                    <h2>Escanea tu QR<br>Lado Izquierdo</h2>
                </div>
                <div id="datos-izq" class="content-wrapper hidden">
                    <div class="boleta-display" id="boleta-izq">---</div>
                    <div class="status-display" id="titulo-izq">---</div>
                    <img id="foto-izq" src="" class="foto-alumno">
                    <div class="mochila-operation" id="msg-izq">---</div>
                </div>
            </div>
        </div>

        <div class="lado-monitor">
            <div class="etiqueta-lado">Torniquete Derecho</div>
            <div id="card-der" class="inscrito-card estado-esperando">
                <div id="espera-der" class="content-wrapper">
                    <img src="/static/images/LIA_Mini.png" width="90" style="opacity: 0.7; margin-bottom: 20px;">
                    <h2>Escanea tu QR<br>Lado Derecho</h2>
                </div>
                <div id="datos-der" class="content-wrapper hidden">
                    <div class="boleta-display" id="boleta-der">---</div>
                    <div class="status-display" id="titulo-der">---</div>
                    <img id="foto-der" src="" class="foto-alumno">
                    <div class="mochila-operation" id="msg-der">---</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let lastTimeIzq = 0;
        let lastTimeDer = 0;
        const RESET_TIME = 6; 

        function actualizarMonitor() {
            fetch('/api/estado_monitor')
                .then(response => response.json())
                .then(data => {
                    renderizarLado('izq', data.izquierda, lastTimeIzq);
                    renderizarLado('der', data.derecha, lastTimeDer);
                    
                    if(data.izquierda.timestamp > lastTimeIzq) lastTimeIzq = data.izquierda.timestamp;
                    if(data.derecha.timestamp > lastTimeDer) lastTimeDer = data.derecha.timestamp;
                    
                    checkReset('izq', data.izquierda.timestamp);
                    checkReset('der', data.derecha.timestamp);
                })
                .catch(err => console.error("Error API:", err));
        }

        function renderizarLado(lado, data, ultimoTiempoConocido) {
            if (data.timestamp > ultimoTiempoConocido) {
                const card = document.getElementById(`card-${lado}`);
                const esperaDiv = document.getElementById(`espera-${lado}`);
                const datosDiv = document.getElementById(`datos-${lado}`);
                
                // Llenar datos
                document.getElementById(`boleta-${lado}`).innerText = data.boleta || data.nombre;
                document.getElementById(`titulo-${lado}`).innerText = data.titulo;
                document.getElementById(`msg-${lado}`).innerText = data.mochila;
                document.getElementById(`foto-${lado}`).src = data.foto;

                // Cambiar visibilidad: quitamos hidden de datos y lo ponemos en espera
                esperaDiv.classList.add('hidden');
                datosDiv.classList.remove('hidden');

                // Aplicar estilo de color
                card.className = 'inscrito-card ' + data.estilo;
                
                // Efecto visual
                card.style.transform = "scale(1.05)";
                setTimeout(() => card.style.transform = "scale(1)", 200);
            }
        }

        function checkReset(lado, timestampData) {
            const ahora = Date.now() / 1000;
            if (ahora - timestampData > RESET_TIME && timestampData > 0) {
                const card = document.getElementById(`card-${lado}`);
                const esperaDiv = document.getElementById(`espera-${lado}`);
                const datosDiv = document.getElementById(`datos-${lado}`);
                
                if (esperaDiv.classList.contains('hidden')) {
                    card.className = 'inscrito-card estado-esperando';
                    datosDiv.classList.add('hidden');
                    esperaDiv.classList.remove('hidden');
                }
            }
        }

        setInterval(actualizarMonitor, 500);
    </script>
</body>
</html>
