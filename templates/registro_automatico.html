<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Automático - QR Codes</title>
    <link rel="icon" href="/static/images/LIA_Mini.png">
    <style>
        /* ================= ESTILOS GENERALES Y TEMA IPN ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* CAMBIO: Alineamos al principio (arriba) en lugar de al centro vertical */
            justify-content: flex-start; 
            align-items: center;
            /* CAMBIO: Aumentamos el padding superior para separarlo del borde físico del navegador */
            padding: 0px 20px 20px 20px; 
            
            /* Fondo estandarizado IPN */
            background: 
                url("/static/images/logo-ipn-blanco.png") no-repeat center center,
                linear-gradient(170deg, #1d6c4e, #ffffff 75%);
            background-size: 750px, cover;
            background-attachment: fixed;
            background-position: center 100px, center;
        }

        /* Header de logos */
        .imagenes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 650px; /* Un poco más ancho para acomodar logos más grandes */
            /* CAMBIO: Aumentamos el margen inferior para separarlos más del contenedor blanco */
            margin-bottom: 30px; 
        }

        .imagenes img {
            /* CAMBIO: Agrandamos los logos en PC (de 120px a 160px) */
            width: 160px; 
            height: auto;
        }

        /* ================= CONTENEDOR PRINCIPAL ================= */
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #115038;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2em;
        }

        .subtitle {
            color: #555;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        /* ================= ÁREA DE CARGA ================= */
        .upload-area {
            border: 3px dashed #1d6c4b;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #fafafa;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #0dbb64;
            background: #fdf5f8;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #155236;
            background: #f3e6ec;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #1d6c58;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #777;
            font-size: 0.9em;
        }

        input[type="file"] {
            display: none;
        }

        /* ================= LISTA DE ARCHIVOS ================= */
        .file-list {
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 8px;
        }

        .file-item {
            background: #f4f4f4;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
        }

        .file-name {
            color: #333;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            color: #888;
            margin-left: 10px;
        }

        /* ================= BOTONES ================= */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background-color: #1d6c52;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            background-color: #155240;
            box-shadow: 0 10px 20px rgba(108, 29, 69, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #555;
        }

        .btn-secondary:hover {
            background: #ccc;
        }

        /* ================= BARRA DE PROGRESO ================= */
        .progress-container {
            display: none;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background-color: #1d6c4b;
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.9em;
        }

        .progress-text {
            text-align: center;
            color: #555;
            font-size: 0.9em;
        }

        /* ================= ESTADO Y ESTADÍSTICAS ================= */
        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
            text-align: center;
            font-weight: bold;
        }

        .status-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #195237;
        }

        .stat-label {
            color: #555;
            font-size: 0.85em;
            margin-top: 5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 10px;
        }

        /* ================= MEDIA QUERIES (CELULARES) ================= */
        @media (max-width: 600px) {
            body { 
                /* CAMBIO: Reducimos el padding superior en celular para aprovechar espacio */
                padding-top: 20px; 
            }
            
            .container {
                padding: 20px;
                border-radius: 15px;
            }

            .upload-area { padding: 20px; }
            .upload-icon { font-size: 3em; margin-bottom: 10px; }
            .upload-text { font-size: 1.1em; }
            h1 { font-size: 1.6em; }
            
            .stats {
                gap: 10px;
            }
            .stat-card { padding: 10px; }
            .stat-number { font-size: 1.5em; }
            .stat-label { font-size: 0.75em; }
            
            .imagenes { 
                padding: 0 10px; 
                margin-bottom: 20px; /* Un poco menos de margen en celular */
            }
            /* CAMBIO: Agrandamos los logos en celular (de 90px a 110px) */
            .imagenes img { width: 110px; } 
        }
    </style>
</head>
<body>

    <div class="imagenes">
        <img class="logo" src="/static/images/Cecyt16.png" alt="CECyT 16">
        <img class="LIA" src="/static/images/Logo_LIA.png" alt="LIA">
    </div>

    <div class="container">
        <h1>📸 Registro Automático</h1>
        <p class="subtitle">Sube todos los códigos QR para procesarlos automáticamente</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Arrastra archivos aquí o haz clic para seleccionar</div>
            <div class="upload-hint">Formatos soportados: PNG, JPG, JPEG, BMP, GIF</div>
        </div>

        <input type="file" id="fileInput" multiple accept="image/*">

        <div class="file-list" id="fileList"></div>

        <div class="status-message" id="statusMessage"></div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="progress-text" id="progressText">Procesando códigos QR...</div>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-number" id="statSuccess">0</div>
                <div class="stat-label">Exitosos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statFailed">0</div>
                <div class="stat-label">Fallidos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total</div>
            </div>
        </div>

        <button class="btn btn-primary" id="uploadBtn" disabled>
            <span id="btnText">Subir y Procesar</span>
        </button>

        <button class="btn btn-secondary" onclick="window.location.href='/seleccionar_metodo'">
            Cancelar / Regresar
        </button>
    </div>

    <script>
        // ... el script permanece exactamente igual ...
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusMessage = document.getElementById('statusMessage');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const stats = document.getElementById('stats');
        const btnText = document.getElementById('btnText');

        let selectedFiles = [];

        // Click en el área de carga
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Prevenir comportamiento por defecto del drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Efectos visuales del drag & drop
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.remove('dragover');
            }, false);
        });

        // Manejar drop de archivos
        uploadArea.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            handleFiles(files);
        }, false);

        // Manejar selección de archivos
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(file => {
                return file.type.startsWith('image/');
            });

            displayFiles();
            uploadBtn.disabled = selectedFiles.length === 0;
        }

        function displayFiles() {
            fileList.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                
                const fileName = document.createElement('div');
                fileName.className = 'file-name';
                fileName.textContent = file.name;
                
                const fileSize = document.createElement('div');
                fileSize.className = 'file-size';
                fileSize.textContent = formatFileSize(file.size);
                
                fileItem.appendChild(fileName);
                fileItem.appendChild(fileSize);
                fileList.appendChild(fileItem);
            });
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message status-${type}`;
            statusMessage.style.display = 'block';
        }

        function hideStatus() {
            statusMessage.style.display = 'none';
        }

        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            // Deshabilitar botón y mostrar progreso
            uploadBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Procesando...';
            progressContainer.style.display = 'block';
            hideStatus();

            // Crear FormData
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('qr_files', file);
            });

            try {
                // Simular progreso
                let progress = 0;
                const progressInterval = setInterval(() => {
                    if (progress < 90) {
                        progress += 5;
                        progressFill.style.width = progress + '%';
                        progressFill.textContent = progress + '%';
                    }
                }, 200);

                // Enviar archivos
                const response = await fetch('/registro_automatico', {
                    method: 'POST',
                    body: formData
                });

                clearInterval(progressInterval);
                progressFill.style.width = '100%';
                progressFill.textContent = '100%';

                const result = await response.json();

                if (result.success) {
                    // Mostrar estadísticas
                    stats.style.display = 'grid';
                    document.getElementById('statSuccess').textContent = result.registros_exitosos;
                    document.getElementById('statFailed').textContent = result.registros_fallidos;
                    document.getElementById('statTotal').textContent = result.total_links;

                    showStatus('✅ Proceso completado exitosamente', 'success');
                    
                    // Mostrar botón finalizar en lugar de redirigir automáticamente
                    if (result.mostrar_finalizar) {
                        uploadBtn.textContent = 'Finalizar Registro';
                        uploadBtn.disabled = false;
                        uploadBtn.onclick = finalizarRegistro;
                        btnText.textContent = 'Finalizar Registro';
                        
                        // Mostrar mensaje de errores si los hay
                        if (result.errores && result.errores.length > 0) {
                            const errorList = result.errores.join('\n');
                            showStatus('⚠️ Proceso completado con algunos errores:\n' + errorList, 'info');
                        }
                    }
                } else {
                    throw new Error(result.error || 'Error desconocido');
                }

            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Error: ' + error.message, 'error');
                uploadBtn.disabled = false;
                btnText.textContent = 'Subir y Procesar';
                progressContainer.style.display = 'none';
            }
        });

        // Función para finalizar el registro
        async function finalizarRegistro() {
            uploadBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Finalizando...';
            
            try {
                const formData = new FormData();
                formData.append('finalizar', 'true');
                
                const response = await fetch('/registro_automatico', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    showStatus('✅ Registro finalizado correctamente', 'success');
                    setTimeout(() => {
                        window.location.href = '/seleccionar_metodo';
                    }, 1500);
                } else {
                    throw new Error('Error al finalizar');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Error finalizando: ' + error.message, 'error');
                uploadBtn.disabled = false;
                btnText.textContent = 'Finalizar Registro';
            }
        }
    </script>
</body>
</html>
