<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Automático - QR Codes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px;
            align-items: center;
            margin: 0;
            text-align: left;
            background: 
            url("/static/images/logo-ipn-blanco.png") no-repeat center center,
            linear-gradient(170deg, #6c1d45, #ffffff 80%);
            display: flex;
            justify-content: center;
            background-size: 750px, cover;
            background-attachment: fixed;
            background-position: center 150px, center;
        }
        .container {
            background: rgba(255, 255, 255, 0.603);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .upload-area {
            border: 3px dashed #6c1d45;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #6c1d4594;
            background: #dddddd54;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #6c1d4594;
            background: #e8e9ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #6c1d45;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        input[type="file"] {
            display: none;
        }

        .file-list {
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            background: #f8f9ff;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
        }

        .file-name {
            color: #333;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-size {
            color: #999;
            margin-left: 10px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c1d45 0%, #ececec 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px #6c1d4594;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-success {
            background: linear-gradient(135deg, #1daa3e 0%, #0d4e00 100%);
            color: white;
            display: none;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(40, 167, 69, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .progress-container {
            display: none;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c1d453d 0%, #6c1d45 100%);
            width: 0%;
            transition: width 0.3s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 0.9em;
        }

        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 0.85em;
            margin-top: 5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        .logo {
            position: absolute;
            left: 5%;
        }
        .LIA {
            position: absolute;
            right: 2%;
            
        }
        .imagenes img {
            width: 500px;
            height: auto;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>   
<body>
    <div class="imagenes">
        <img class="logo" src="../static/images/Cecyt16.png" alt="">
        <img class="LIA" src="../static/images/Logo_LIA.png" alt="">
    </div>
    <div class="container">
        <h1>📸 Registro Automático</h1>
        <p class="subtitle">Sube todos los códigos QR para procesarlos automáticamente</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Arrastra archivos aquí o haz clic para seleccionar</div>
            <div class="upload-hint">Formatos soportados: PNG, JPG, JPEG, BMP, GIF</div>
        </div>

        <input type="file" id="fileInput" multiple accept="image/*">

        <div class="file-list" id="fileList"></div>

        <div class="status-message" id="statusMessage"></div>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">0%</div>
            </div>
            <div class="progress-text" id="progressText">Procesando códigos QR...</div>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-number" id="statSuccess">0</div>
                <div class="stat-label">Exitosos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statFailed">0</div>
                <div class="stat-label">Fallidos</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total</div>
            </div>
        </div>

        <!-- Botón para subir y procesar -->
        <button class="btn btn-primary" id="uploadBtn" disabled>
            <span id="btnText">Subir y Procesar</span>
        </button>

        <!-- Botón para finalizar (oculto inicialmente) -->
        <button class="btn btn-success" id="finalizarBtn">
            <span id="finalizarBtnText">✅ Finalizar Registro</span>
        </button>

        <button class="btn btn-secondary" onclick="window.location.href='/seleccionar_metodo'">
            Cancelar
        </button>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const uploadBtn = document.getElementById('uploadBtn');
        const finalizarBtn = document.getElementById('finalizarBtn');
        const statusMessage = document.getElementById('statusMessage');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const stats = document.getElementById('stats');
        const btnText = document.getElementById('btnText');
        const finalizarBtnText = document.getElementById('finalizarBtnText');

        let selectedFiles = [];

        // Click en el área de carga
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Prevenir comportamiento por defecto del drag & drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Efectos visuales del drag & drop
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.remove('dragover');
            }, false);
        });

        // Manejar drop de archivos
        uploadArea.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            handleFiles(files);
        }, false);

        // Manejar selección de archivos
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            selectedFiles = Array.from(files).filter(file => {
                return file.type.startsWith('image/');
            });

            displayFiles();
            uploadBtn.disabled = selectedFiles.length === 0;
        }

        function displayFiles() {
            fileList.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                
                const fileName = document.createElement('div');
                fileName.className = 'file-name';
                fileName.textContent = file.name;
                
                const fileSize = document.createElement('div');
                fileSize.className = 'file-size';
                fileSize.textContent = formatFileSize(file.size);
                
                fileItem.appendChild(fileName);
                fileItem.appendChild(fileSize);
                fileList.appendChild(fileItem);
            });
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message status-${type}`;
            statusMessage.style.display = 'block';
        }

        function hideStatus() {
            statusMessage.style.display = 'none';
        }

        // Botón de subir y procesar
        uploadBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            // Deshabilitar botón y mostrar progreso
            uploadBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Procesando...';
            progressContainer.style.display = 'block';
            hideStatus();

            // Crear FormData con acción específica
            const formData = new FormData();
            formData.append('accion', 'procesar'); // Identificador de acción
            selectedFiles.forEach(file => {
                formData.append('qr_files', file);
            });

            try {
                // Simular progreso
                let progress = 0;
                const progressInterval = setInterval(() => {
                    if (progress < 90) {
                        progress += 5;
                        progressFill.style.width = progress + '%';
                        progressFill.textContent = progress + '%';
                    }
                }, 200);

                // Enviar archivos
                const response = await fetch('/registro_automatico', {
                    method: 'POST',
                    body: formData
                });

                clearInterval(progressInterval);
                progressFill.style.width = '100%';
                progressFill.textContent = '100%';

                const result = await response.json();

                if (result.success) {
                    // Mostrar estadísticas
                    stats.style.display = 'grid';
                    document.getElementById('statSuccess').textContent = result.registros_exitosos;
                    document.getElementById('statFailed').textContent = result.registros_fallidos;
                    document.getElementById('statTotal').textContent = result.total_links;

                    showStatus('✅ Proceso completado exitosamente', 'success');
                    
                    // Ocultar botón de subir y mostrar botón de finalizar
                    uploadBtn.classList.add('hidden');
                    finalizarBtn.style.display = 'block';
                    
                    // Mostrar mensaje de errores si los hay
                    if (result.errores && result.errores.length > 0) {
                        const errorList = result.errores.join('\n');
                        showStatus('⚠️ Proceso completado con algunos errores:\n' + errorList, 'info');
                    }
                } else {
                    throw new Error(result.error || 'Error desconocido');
                }

            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Error: ' + error.message, 'error');
                uploadBtn.disabled = false;
                btnText.textContent = 'Subir y Procesar';
                progressContainer.style.display = 'none';
            }
        });

        // Botón de finalizar registro
        finalizarBtn.addEventListener('click', async () => {
            finalizarBtn.disabled = true;
            finalizarBtnText.innerHTML = '<span class="spinner"></span> Finalizando...';
            
            try {
                // Crear FormData solo con la acción de finalizar
                const formData = new FormData();
                formData.append('accion', 'finalizar'); // Identificador de acción
                
                const response = await fetch('/registro_automatico', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('✅ Registro finalizado correctamente', 'success');
                    setTimeout(() => {
                        window.location.href = '/seleccionar_metodo';
                    }, 1500);
                } else {
                    throw new Error(result.error || 'Error al finalizar');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Error finalizando: ' + error.message, 'error');
                finalizarBtn.disabled = false;
                finalizarBtnText.textContent = '✅ Finalizar Registro';
            }
        });
    </script>
</body>
</html>
